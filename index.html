<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedar Maheshwari - Business Card</title>
    <style>
        :root {
            --primary-color: #1e293b;
            --secondary-color: #64748b;
            --accent-color: #0ea5e9;
            --accent-hover: #0284c7;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #e0f2fe 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #f1f5f9 0%, transparent 40%);
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 380px;
            width: 100%;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.12);
        }

        .profile-name {
            margin-bottom: 8px;
            font-size: 28px;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .job-title {
            font-size: 16px;
            color: var(--secondary-color);
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 32px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 36px;
            text-align: left;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--primary-color);
            font-size: 15px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .contact-item:hover {
            color: var(--accent-color);
        }

        .icon {
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 24px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 24px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--accent-color);
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.25);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="profile-name">Kedar Maheshwari</h1>
        <div class="job-title">Sales and Marketing Head<br>Prakruti Tours and Travels</div>
        
        <div class="contact-info">
            <a href="tel:+918347215625" class="contact-item">
                <span class="icon">📞</span>
                <span>+91 8347215625</span>
            </a>
            <a href="mailto:kedarmaheshwari2004@gmail.com" class="contact-item">
                <span class="icon">✉️</span>
                <span>kedarmaheshwari2004@gmail.com</span>
            </a>
            <div class="contact-item">
                <span class="icon">📍</span>
                <span>Bhuj, Kutch</span>
            </div>
        </div>

        <a href="kedar_contact.vcf" class="btn" download>Save Contact</a>
    </div>
</body>
</html>
