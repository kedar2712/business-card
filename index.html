<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedar Maheshwari - Business Card</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f4f4f9; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 320px; 
            width: 100%; 
        }
        h1 { margin: 0 0 5px; font-size: 26px; color: #222; }
        h2 { margin: 0 0 20px; font-size: 16px; color: #555; font-weight: 500; }
        p { margin: 8px 0; color: #444; font-size: 15px; }
        .btn { 
            display: inline-block; 
            margin-top: 25px; 
            padding: 12px 24px; 
            background-color: #2c3e50; 
            color: white; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .btn:hover { background-color: #1a252f; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Kedar Maheshwari</h1>
